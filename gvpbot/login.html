<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — GVP BOT</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">
  <div class="auth-bg">
    <div class="auth-orb orb-1"></div>
    <div class="auth-orb orb-2"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
          <defs>
            <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#3B82F6"/>
              <stop offset="100%" style="stop-color:#8B5CF6"/>
            </linearGradient>
          </defs>
          <rect width="32" height="32" rx="8" fill="url(#lg)"/>
          <path d="M8 10h16M8 16h10M8 22h13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="24" cy="22" r="4" fill="#22C55E"/>
        </svg>
        <span class="logo-text">GVP<span class="logo-accent">BOT</span></span>
      </a>

      <h1 class="auth-title">Bem-vindo de volta</h1>
      <p class="auth-subtitle">Entre na sua conta para continuar</p>

      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">E-mail</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">
            Senha
            <a href="recuperar.html" class="forgot-link">Esqueceu a senha?</a>
          </label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">👁️</button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="form-check">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" />
            <span class="checkmark"></span>
            Lembrar de mim
          </label>
        </div>

        <div class="form-error" id="formError"></div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="btn-text">Entrar</span>
          <div class="btn-loader" id="btnLoader"></div>
        </button>

        <div class="auth-divider"><span>ou continue com</span></div>

        <div class="social-auth">
          <button type="button" class="btn-social" onclick="socialLogin('Google')">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button type="button" class="btn-social" onclick="socialLogin('Meta')">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Meta
          </button>
        </div>
      </form>

      <p class="auth-footer-text">
        Não tem uma conta? <a href="cadastro.html">Criar conta grátis</a>
      </p>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      clearErrors();
      let valid = true;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !validateEmail(email)) {
        showError('emailError', 'Digite um e-mail válido');
        document.getElementById('email').closest('.input-wrapper').classList.add('error');
        valid = false;
      }
      if (!password || password.length < 6) {
        showError('passwordError', 'A senha deve ter pelo menos 6 caracteres');
        document.getElementById('password').closest('.input-wrapper').classList.add('error');
        valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById('submitBtn');
      btn.classList.add('loading');
      setTimeout(() => {
        btn.classList.remove('loading');
        window.location.href = 'dashboard.html';
      }, 1800);
    }

    function validateEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
    function showError(id, msg) { document.getElementById(id).textContent = msg; }
    function clearErrors() {
      document.querySelectorAll('.field-error').forEach(e => e.textContent = '');
      document.querySelectorAll('.input-wrapper').forEach(e => e.classList.remove('error'));
    }
    function togglePassword(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }
    function socialLogin(provider) {
      const btn = event.target.closest('.btn-social');
      btn.classList.add('loading');
      setTimeout(() => { btn.classList.remove('loading'); window.location.href = 'dashboard.html'; }, 1500);
    }
  </script>
</body>
</html>
