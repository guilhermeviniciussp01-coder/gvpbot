<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070C18" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>GVP BOT — Automatize seu WhatsApp com IA</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background: #070C18;
        color: #F8FAFC;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
      /* Initial loading splash */
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #070C18;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 1.25rem;
        transition: opacity .4s ease, visibility .4s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      .splash-logo {
        width: 58px; height: 58px; border-radius: 15px;
        background: linear-gradient(135deg, #3B82F6, #8B5CF6);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.6rem;
        box-shadow: 0 0 40px rgba(59,130,246,.5);
        animation: splashFloat 1.8s ease-in-out infinite;
      }
      .splash-dots {
        display: flex; gap: .45rem;
      }
      .splash-dots span {
        width: 7px; height: 7px; border-radius: 50%;
        background: rgba(59,130,246,.4);
        animation: splashBounce 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: .2s; }
      .splash-dots span:nth-child(3) { animation-delay: .4s; }
      @keyframes splashFloat {
        0%,100% { transform: translateY(0); box-shadow: 0 0 40px rgba(59,130,246,.5); }
        50%      { transform: translateY(-8px); box-shadow: 0 0 60px rgba(139,92,246,.6); }
      }
      @keyframes splashBounce {
        0%,80%,100% { transform: scale(.8); background: rgba(59,130,246,.3); }
        40%          { transform: scale(1.2); background: #3B82F6; }
      }
    </style>
  </head>
  <body>

    <!-- Loading splash (hidden once React mounts) -->
    <div id="splash">
      <div class="splash-logo">🤖</div>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide splash once React has mounted
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) s.classList.add('hidden');
        }, 600);
      });
    </script>
  </body>
</html>
